<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Categories</title>
    <meta
      name="description"
      content="Organize your pharmacy products into logical categories like antibiotics, painkillers, and personal care for quick access and streamlined inventory tracking."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <!------------------ JAVASCRIPT ------------------>
    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    <!--  -->
    <script type="module" src="../assets/pages/categories.js"></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header class="border-bottom border-bottom-5 border-gray-200 px-4">
        <nav class="navbar">
          <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
              <img
                src="../assets/imgs/logo.png"
                class="logo me-1"
                alt="PharmaFlow Logo"
              />
              <span class="text-primary fw-semibold"
                >Pharma<span class="text-success text-info-dark"
                  >Flow</span
                ></span
              >
            </a>
            <div class="d-flex align-items-center gap-2">
              <div class="text-end">
                <h5 class="fs-6 mb-0">Admin User</h5>
                <p class="fs-12 mb-0 text-secondary user-role">
                  Inventory Manager
                </p>
              </div>
              <div
                class="user-img main-bg text-white d-flex align-items-center justify-content-center rounded-circle fs-6 fw-semibold"
              >
                AU
              </div>
            </div>
          </div>
        </nav>
      </header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main">
            <nav class="py-4">
              <ul class="d-flex flex-column gap-3 list-unstyled">
                <li class="sidebar-nav rounded-2">
                  <a
                    href="../index.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                  >
                    <i class="fa fa-chart-pie me-3"></i>Dashboard</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="products.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-cube me-3"></i>Products</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="categories.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                  >
                    <i class="fa-regular fa-folder-open me-3"></i>Categories
                  </a>
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="suppliers.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-truck me-3"></i>Suppliers
                  </a>
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="orders.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-cart-shopping me-3"></i>Purchase Orders</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="stock-adjustments.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-rotate me-3"></i>Stock Adjustments</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="reports.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-file-lines me-3"></i>Reports</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="activity-log.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-history me-3"></i>Activity Log</a
                  >
                </li>
              </ul>
            </nav>
          </aside>

          <!-- Main page -->
          <main class="col-12 col-md-9 pt-4">
            <div class="container">
              <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
              >
                <div>
                  <h2 class="fw-bold text-dark-blue mb-1">Categories</h2>
                  <p class="text-secondary mb-0">
                    Organize your inventory into categories
                  </p>
                </div>
                <button
                  class="btn main-btn"
                  data-bs-toggle="modal"
                  data-bs-target="#addCategoryModal"
                  data-action="add"
                >
                  <i class="fa fa-plus-circle me-1"></i> Add Category
                </button>
              </div>

              <div class="row g-4 categories-container"></div>
            </div>
          </main>
        </div>
      </div>
    </div>

    <!-- Modal Add Category -->
    <div
      class="modal fade"
      id="addCategoryModal"
      tabindex="-1"
      aria-labelledby="addCategoryModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
          <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
            <div>
              <h5
                class="modal-title fw-bold text-primary mb-1"
                id="addCategoryModalLabel"
              >
                Add New Category
              </h5>
              <p class="text-secondary font-12 mb-0">
                Enter the details for the new category
              </p>
            </div>
            <button
              type="button"
              class="btn-close mb-auto mt-1"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body px-4 pt-4 pb-2">
            <form id="addCategoryForm">
              <input type="hidden" id="categoryId" />
              <div class="mb-3">
                <label
                  for="categoryName"
                  class="form-label fw-medium text-dark-blue"
                  style="font-size: 14px"
                >
                  Category Name <span class="text-danger">*</span>
                </label>
                <input
                  type="text"
                  class="form-control py-2 rounded-3"
                  id="categoryName"
                  placeholder="e.g., Electronics"
                  required
                />
              </div>

              <div class="mb-4">
                <label
                  for="categoryDescription"
                  class="form-label fw-medium text-dark-blue"
                  style="font-size: 14px"
                >
                  Description
                </label>
                <textarea
                  class="form-control rounded-3"
                  id="categoryDescription"
                  rows="3"
                  placeholder="Enter category description..."
                ></textarea>
              </div>
            </form>
          </div>

          <div class="modal-footer border-top-0 px-4 pb-4 pt-0 d-flex gap-3">
            <button
              type="button"
              class="btn btn-outline-custom px-4 py-2 rounded-3 fw-medium m-0"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="submit"
              form="addCategoryForm"
              class="btn btn-add main-btn m-0"
            >
              Add Category
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
