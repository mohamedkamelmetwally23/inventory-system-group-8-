<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Suppliers</title>
    <meta
      name="description"
      content="Manage contact details and profiles for pharmaceutical companies and medical suppliers to streamline your pharmacy's procurement process."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/table.css" />

    <!------------------ JAVASCRIPT ------------------>
    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>

    <!-- assets -->
    <script defer src="../assets/components/table.js"></script>
    <script type="module" src="../assets/pages/suppliers.js"></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header
        class="border-bottom border-bottom-5 border-gray-200 px-4"
      ></header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main"></aside>

          <!-- Main page -->
          <main class="col-9">
            <section class="suppliers-section">
              <div class="container">
                <div
                  class="section-header d-flex justify-content-between align-items-center"
                >
                  <div>
                    <h1>Suppliers</h1>
                    <p>Manage your suppliers relationships</p>
                  </div>
                  <button class="btn" id="addSupplier">
                    <i class="fa-solid fa-circle-plus"></i>
                    Add New Supplier
                  </button>
                </div>

                <div class="table-container border rounded-4 p-3">
                  <!-- Table -->
                  <table class="table" id="dataTable">
                    <caption
                      id="tableCaption"
                      style="caption-side: top"
                    ></caption>
                    <thead>
                      <tr id="tableHead"></tr>
                    </thead>

                    <tbody id="tableBody"></tbody>
                  </table>

                  <!--  -->
                  <div class="modal fade" id="supplierModal">
                    <div class="modal-dialog">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h5 class="modal-title">Supplier</h5>
                        </div>
                        <div class="modal-body">
                          <form id="supplierForm">
                            <input
                              class="form-control mb-2"
                              id="name"
                              placeholder="Supplier Name"
                            />
                            <input
                              class="form-control mb-2"
                              id="contactPerson"
                              placeholder="Contact Person"
                            />
                            <input
                              class="form-control mb-2"
                              id="phone"
                              placeholder="Phone"
                            />
                            <input
                              class="form-control mb-2"
                              id="email"
                              placeholder="Email"
                            />
                            <input
                              class="form-control mb-2"
                              id="address"
                              placeholder="Address"
                            />
                          </form>
                        </div>
                        <div class="modal-footer">
                          <button
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                          >
                            Cancel
                          </button>
                          <button
                            type="button"
                            class="btn btn-primary"
                            id="saveSupplier"
                          >
                            Save
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!--  -->
                  <div class="modal fade" id="deleteModal">
                    <div class="modal-dialog modal-dialog-centered">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h5 class="modal-title">Delete Supplier</h5>
                        </div>
                        <div class="modal-body text-center">
                          <p>Are you sure you want to delete this supplier?</p>
                        </div>
                        <div class="modal-footer">
                          <button
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                          >
                            Cancel
                          </button>
                          <button class="btn btn-danger" id="confirmDelete">
                            Yes Delete
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Pagination -->
                  <div
                    class="table-footer d-flex justify-content-between align-items-center"
                  >
                    <span id="tableInfo" class="fs-6"></span>

                    <div class="pagination gap-2">
                      <button id="prevBtn" class="rounded-2">
                        <i class="fa-solid fa-angle-left"></i>
                      </button>
                      <span
                        id="pageNumber"
                        class="d-flex justify-content-center align-items-center rounded-1"
                        >1</span
                      >
                      <button id="nextBtn" class="rounded-2">
                        <i class="fa-solid fa-angle-right"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
