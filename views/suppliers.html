<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Suppliers</title>
    <meta
      name="description"
      content="Manage contact details and profiles for pharmaceutical companies and medical suppliers to streamline your pharmacy's procurement process."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/table.css" />

    <!------------------ JAVASCRIPT ------------------>
    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>

    <!-- assets -->
    <script type="module" src="../assets/pages/suppliers.js"></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header
        class="border-bottom border-bottom-5 border-gray-200 px-md-2 px-lg-4"
      ></header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-lg-3 d-none d-lg-block" id="main"></aside>

          <div
            class="offcanvas offcanvas-start d-lg-none p-0"
            tabindex="-1"
            id="offcanvasSidebar"
          >
            <div class="offcanvas-header">
              <h5 class="offcanvas-title">Menu</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
              ></button>
            </div>
            <div class="offcanvas-body main-bg"></div>
          </div>

          <!-- Main page -->
          <main class="col-12 col-lg-9 pt-4 bg-light">
            <section class="suppliers-section">
              <div class="container-lg">
                <div
                  class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
                >
                  <div>
                    <h2 class="fw-bold text-dark-blue mb-1">Suppliers</h2>
                    <p class="text-secondary mb-0">
                      Manage your suppliers relationships
                    </p>
                  </div>
                  <button class="btn main-btn" id="addSupplier">
                    <i class="fa-solid fa-circle-plus"></i>
                    Add New Supplier
                  </button>
                </div>

                <div class="table-container border rounded-4 p-3">
                  <!-- Table -->
                  <table class="table" id="dataTable">
                    <caption
                      id="tableCaption"
                      style="caption-side: top"
                    ></caption>
                    <thead>
                      <tr id="tableHead"></tr>
                    </thead>

                    <tbody id="tableBody"></tbody>
                  </table>

                  <!-- Pagination -->
                  <div
                    class="table-footer d-flex justify-content-between align-items-center"
                  >
                    <span id="tableInfo" class="fs-6"></span>

                    <div class="pagination gap-2">
                      <button id="prevBtn" class="rounded-2">
                        <i class="fa-solid fa-angle-left"></i>
                      </button>
                      <span
                        id="pageNumber"
                        class="d-flex justify-content-center align-items-center rounded-1"
                        >1</span
                      >
                      <button id="nextBtn" class="rounded-2">
                        <i class="fa-solid fa-angle-right"></i>
                      </button>
                    </div>
                  </div>

                  <!-- Modal Add / Edit Suppliers -->
                  <div
                    class="modal fade"
                    id="addSupplierModal"
                    tabindex="-1"
                    aria-labelledby="addSupplierModalLabel"
                    aria-hidden="true"
                  >
                    <div class="modal-dialog modal-dialog-centered">
                      <div class="modal-content border-0 shadow rounded-4">
                        <div
                          class="modal-header border-bottom-0 pb-0 pt-4 px-4"
                        >
                          <div>
                            <h5
                              class="modal-title fw-bold text-primary mb-1"
                              id="addSupplierModalLabel"
                            >
                              Add New Supplier
                            </h5>
                            <p
                              id="supplierModalSubtitle"
                              class="text-secondary font-12 mb-0"
                            >
                              Enter the details for the new supplier
                            </p>
                          </div>
                        </div>

                        <div class="modal-body px-4 pt-4 pb-2">
                          <form id="addSupplierForm">
                            <input type="hidden" id="supplierId" />

                            <!-- Supplier Name -->
                            <div class="mb-3">
                              <label
                                for="supplierName"
                                class="form-label fw-medium text-dark-blue"
                                style="font-size: 14px"
                              >
                                Supplier Name
                                <span class="text-danger">*</span>
                              </label>
                              <input
                                type="text"
                                class="form-control py-2 rounded-3"
                                id="supplierName"
                                name="supplier_name"
                                placeholder="e.g., Cleopatra Pharma"
                              />
                            </div>

                            <!-- Contact Name -->
                            <div class="mb-3">
                              <label
                                for="contactName"
                                class="form-label fw-medium text-dark-blue"
                                style="font-size: 14px"
                              >
                                Contact Name
                                <span class="text-danger">*</span>
                              </label>
                              <input
                                type="text"
                                class="form-control py-2 rounded-3"
                                id="contactName"
                                name="contact_name"
                                placeholder="e.g., Ahmed Fouad"
                              />
                            </div>

                            <!-- Contact Phone -->
                            <div class="mb-3">
                              <label
                                for="contactPhone"
                                class="form-label fw-medium text-dark-blue"
                                style="font-size: 14px"
                              >
                                Phone <span class="text-danger">*</span>
                              </label>
                              <input
                                type="tel"
                                class="form-control py-2 rounded-3"
                                id="contactPhone"
                                name="contact_phone"
                                placeholder="e.g., +20-120-149-2186"
                              />
                            </div>

                            <!-- Contact Email -->
                            <div class="mb-3">
                              <label
                                for="contactEmail"
                                class="form-label fw-medium text-dark-blue"
                                style="font-size: 14px"
                              >
                                Email <span class="text-danger">*</span>
                              </label>
                              <input
                                type="text"
                                class="form-control py-2 rounded-3"
                                id="contactEmail"
                                name="contact_email"
                                placeholder="e.g., ahmed.fouad@cleopatrapharma.com"
                              />
                            </div>

                            <!-- Address -->
                            <div class="mb-3">
                              <label
                                for="address"
                                class="form-label fw-medium text-dark-blue"
                                style="font-size: 14px"
                              >
                                Address <span class="text-danger">*</span>
                              </label>
                              <input
                                type="text"
                                class="form-control py-2 rounded-3"
                                id="address"
                                name="address"
                                placeholder="e.g., 284 Tahrir St, New Cairo, Luxor, Egypt"
                              />
                            </div>
                          </form>
                        </div>

                        <div
                          class="modal-footer border-top-0 px-4 pb-4 pt-0 d-flex gap-3"
                        >
                          <button
                            type="button"
                            class="btn btn-outline-custom px-4 py-2 rounded-3 fw-medium m-0"
                            data-bs-dismiss="modal"
                          >
                            Cancel
                          </button>
                          <button
                            type="submit"
                            form="addSupplierForm"
                            class="btn btn-add main-btn m-0"
                          >
                            Add Supplier
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Delete Modal -->
                <div class="modal fade" id="deleteModal">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                      <div class="modal-header">
                        <h5 class="modal-title">Delete Supplier</h5>
                      </div>

                      <div class="modal-body text-center">
                        <p>Are you sure you want to delete this supplier?</p>
                      </div>

                      <div class="modal-footer">
                        <button
                          class="btn btn-secondary"
                          data-bs-dismiss="modal"
                        >
                          Cancel
                        </button>
                        <button class="btn btn-danger" id="confirmDelete">
                          Yes Delete
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
