<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Orders</title>
    <meta
      name="description"
      content="Create purchase orders and manage stock deliveries from pharmaceutical companies. Automatically update your pharmacy inventory upon receiving shipments."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <!------------------ JAVASCRIPT ------------------>
    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header class="border-bottom border-bottom-5 border-gray-200 px-4">
        <nav class="navbar">
          <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
              <img
                src="../assets/imgs/logo.png"
                class="logo me-1"
                alt="PharmaFlow Logo"
              />
              <span class="text-primary fw-semibold"
                >Pharma<span class="text-success text-info-dark"
                  >Flow</span
                ></span
              >
            </a>
            <div class="d-flex align-items-center gap-2">
              <div class="text-end">
                <h5 class="fs-6 mb-0">Admin User</h5>
                <p class="fs-12 mb-0 text-secondary user-role">
                  Inventory Manager
                </p>
              </div>
              <div
                class="user-img main-bg text-white d-flex align-items-center justify-content-center rounded-circle fs-6 fw-semibold"
              >
                AU
              </div>
            </div>
          </div>
        </nav>
      </header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main">
            <nav class="py-4">
              <ul class="d-flex flex-column gap-3 list-unstyled">
                <li class="sidebar-nav rounded-2">
                  <a
                    href="../index.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                  >
                    <i class="fa fa-chart-pie me-3"></i>Dashboard</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./products.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-cube me-3"></i>Products</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./categories.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                  >
                    <i class="fa-regular fa-folder-open me-3"></i>Categories
                  </a>
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./suppliers.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-truck me-3"></i>Suppliers
                  </a>
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./orders.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-cart-shopping me-3"></i>Purchase Orders</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./stock-adjustments.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-rotate me-3"></i>Stock Adjustments</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./reports.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-file-lines me-3"></i>Reports</a
                  >
                </li>
                <li class="sidebar-nav rounded-2">
                  <a
                    href="./activity-log.html"
                    class="text-white text-decoration-none d-block py-2 px-4"
                    ><i class="fa fa-history me-3"></i>Activity Log</a
                  >
                </li>
              </ul>
            </nav>
          </aside>

          <!-- Main page -->
          <main class="col-9 main">
            <div class="container-fluid">
              <div
                class="d-lg-flex justify-content-between align-items-center my-3"
              >
                <div>
                  <h1>Purchase Orders</h1>
                  <p>Manage and track purchase orders</p>
                </div>
                <div>
                  <button class="border-1 rounded p-2 bg-white">
                    <i class="fa-solid fa-download"></i> Export
                  </button>
                  <button class="main-btn border-1">
                    <i class="fa-solid fa-plus mx-1"></i> Create Orders
                  </button>
                </div>
              </div>
            </div>
            <div class="container-fluid">
              <div class="row">
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Total Orders</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Pending</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Approved</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Received</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="container-fluid py-4 rounded">
              <div class="card">
                <div class="card-body">
                  <input
                    type="text"
                    class="form-control search"
                    placeholder=" &#xF002; Search purchase orders.."
                  />
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
