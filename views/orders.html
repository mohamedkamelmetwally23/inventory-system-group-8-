<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Orders</title>
    <meta
      name="description"
      content="Create purchase orders and manage stock deliveries from pharmaceutical companies. Automatically update your pharmacy inventory upon receiving shipments."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="../assets/css/table.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />

    <!------------------ JAVASCRIPT ------------------>
    <script defer src="../assets/components/table.js"></script>

    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="../assets/pages/orders.js"></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header class="border-bottom border-bottom-5 border-gray-200 px-4">
        
      </header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main">
            
          </aside>

          <!-- Main page -->
          <main class="col-12 col-md-9 pt-4">
            <div class="container">
              <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
              >
                <div>
                  <h2 class="fw-bold text-dark-blue mb-1">Purchase Orders</h2>
                  <p class="text-secondary mb-0">
                    Manage and track purchase orders
                  </p>
                </div>
                <div>
                  <button class="border-1 rounded p-2 bg-white me-2">
                    <i class="fa-solid fa-download"></i> Export
                  </button>
                  <button class="main-btn create-order border-1">
                    <i class="fa-solid fa-plus mx-1"></i> Create Orders
                  </button>
                </div>
              </div>
            </div>
            <div class="container">
              <div class="row">
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card h-100 border shadow-sm rounded-4 p-2">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Total Orders</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card h-100 border shadow-sm rounded-4 p-2">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Pending</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card h-100 border shadow-sm rounded-4 p-2">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Approved</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-3 col-md-6 col-sm-12 my-1">
                  <div class="card h-100 border shadow-sm rounded-4 p-2">
                    <div class="card-body">
                      <h5 class="card-title fs-14">Received</h5>
                      <p class="card-text my-5 fs-2">5</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="container-fluid py-4 rounded">
              <div class="card h-100 border shadow-sm rounded-4 p-3">
                <div class="d-flex align-items-center search p-2 rounded-4">
                  <i class="fa-solid fa-magnifying-glass mx-1"></i>
                  <input
                    id="search"
                    type="text"
                    class="form-control border-0 search"
                    placeholder=" Search purchase orders.."
                  />
                </div>
              </div>
            </div>

            <!-- Table Section  -->
            <div class="class-name border rounded-4 p-3">
              <!-- Table -->
              <table class="table" id="dataTable">
                <caption id="tableCaption" style="caption-side: top"></caption>
                <thead>
                  <tr id="tableHead"></tr>
                </thead>

                <tbody id="tableBody"></tbody>
              </table>
              <div
                class="table-footer d-flex justify-content-between align-items-center"
              >
                <span id="tableInfo" class="fs-6"></span>

                <div class="pagination gap-2">
                  <button id="prevBtn" class="rounded-2">
                    <i class="fa-solid fa-angle-left"></i>
                  </button>
                  <span
                    id="pageNumber"
                    class="d-flex justify-content-center align-items-center rounded-1"
                    >1</span
                  >
                  <button id="nextBtn" class="rounded-2">
                    <i class="fa-solid fa-angle-right"></i>
                  </button>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
    <script src="../assets/pages/orders.js" type="module"></script>
  </body>
</html>
