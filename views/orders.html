<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow | Orders</title>
    <meta
      name="description"
      content="Create purchase orders and manage stock deliveries from pharmaceutical companies. Automatically update your pharmacy inventory upon receiving shipments."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->

    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/table.css" />
    <!------------------ JAVASCRIPT ------------------>

    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module" src="../assets/pages/orders.js"></script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header
        class="border-bottom border-bottom-5 border-gray-200 px-4"
      ></header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main"></aside>

          <!-- Main page -->
          <main class="col-12 col-md-9 pt-4">
            <div class="container">
              <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
              >
                <div>
                  <h2 class="fw-bold text-dark-blue mb-1">Purchase Orders</h2>
                  <p class="text-secondary mb-0">
                    Manage and track purchase orders
                  </p>
                </div>
                <div>
                  <button class="border-1 rounded p-2 bg-white me-2">
                    <i class="fa-solid fa-download"></i> Export
                  </button>
                  <button class="main-btn create-order border-1">
                    <i class="fa-solid fa-plus mx-1"></i> Create Orders
                  </button>
                </div>
              </div>
            </div>
            <div class="container">
              <div class="row">
                <div class="col-lg-4 col-md-4 col-12 my-1">
                  <div class="card h-100 border-0 shadow-sm">
                    <div
                      class="card-body d-flex flex-column justify-content-center align-items-center text-center"
                    >
                      <div
                        class="bg-white rounded-circle p-2 mb-2 d-flex align-items-center justify-content-center"
                        style="
                          background: linear-gradient(
                            135deg,
                            #7fd8be 0%,
                            #50c9c3 100%
                          );
                          width: 45px;
                          height: 45px;
                        "
                      >
                        <i
                          class="fa fa-shopping-cart text-white"
                          style="font-size: 20px"
                        ></i>
                      </div>

                      <h6 class="card-title mb-2 small">Total Orders</h6>

                      <p
                        id="totalOrders"
                        class="card-text fw-bold fs-6 mb-0 total-order"
                        style="color: #4a9d8f"
                      >
                        0
                      </p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-4 col-md-4 col-12 my-1">
                  <div class="card h-100 border-0 shadow-sm">
                    <div
                      class="card-body d-flex flex-column justify-content-center align-items-center text-center"
                    >
                      <div
                        class="bg-white rounded-circle p-2 mb-2 d-flex align-items-center justify-content-center"
                        style="
                          background: linear-gradient(
                            135deg,
                            #ffd56b 0%,
                            #ffb347 100%
                          );
                          width: 45px;
                          height: 45px;
                        "
                      >
                        <i
                          class="fa fa-hourglass-half text-white"
                          style="font-size: 20px"
                        ></i>
                      </div>

                      <h6 class="card-title mb-2 small">Pending Orders</h6>

                      <p
                        id="pendingOrders"
                        class="card-text fw-bold fs-6 mb-0 pending"
                        style="color: #c98a2e"
                      >
                        0
                      </p>
                    </div>
                  </div>
                </div>
                <div class="col-lg-4 col-md-4 col-12 my-1">
                  <div class="card h-100 border-0 shadow-sm">
                    <div
                      class="card-body d-flex flex-column justify-content-center align-items-center text-center"
                    >
                      <div
                        class="bg-white rounded-circle p-2 mb-2 d-flex align-items-center justify-content-center"
                        style="
                          background: linear-gradient(
                            135deg,
                            #a5b9ff 0%,
                            #6f9ff2 100%
                          );
                          width: 45px;
                          height: 45px;
                        "
                      >
                        <i
                          class="fa fa-box text-white"
                          style="font-size: 20px"
                        ></i>
                      </div>

                      <h6 class="card-title mb-2 small">Received Orders</h6>

                      <p
                        id="receivedOrders"
                        class="card-text fw-bold fs-6 mb-0 received"
                        style="color: #4c6edb"
                      >
                        0
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="container-fluid py-4 rounded">
              <div class="card h-100 border shadow-sm rounded-4 p-3">
                <div class="d-flex align-items-center search p-2 rounded-4">
                  <i class="fa-solid fa-magnifying-glass mx-1"></i>
                  <input
                    id="search"
                    type="text"
                    class="form-control border-0 search"
                    placeholder=" Search purchase orders.."
                  />
                </div>
              </div>
            </div>

            <!-- Table Section  -->
            <div class="table-container border rounded-4 p-3">
              <!-- Table -->
              <table class="table" id="dataTable">
                <caption id="tableCaption" style="caption-side: top"></caption>
                <thead>
                  <tr id="tableHead"></tr>
                </thead>

                <tbody id="tableBody"></tbody>
              </table>
              <div
                class="table-footer d-flex justify-content-between align-items-center"
              >
                <span id="tableInfo" class="fs-6"></span>

                <div class="pagination gap-2">
                  <button id="prevBtn" class="rounded-2">
                    <i class="fa-solid fa-angle-left"></i>
                  </button>
                  <span
                    id="pageNumber"
                    class="d-flex justify-content-center align-items-center rounded-1"
                    >1</span
                  >
                  <button id="nextBtn" class="rounded-2">
                    <i class="fa-solid fa-angle-right"></i>
                  </button>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
    <!-- ========== show Order Details ==========  -->
    <div
      class="modal fade"
      id="orderModal"
      tabindex="-1"
      aria-labelledby="orderModal"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content order-details bg-light">
          <div class="modal-header">
            <div class="container">
              <h5 class="modal-title" id="orderModal">
                Purchase Orders Details
              </h5>
              <span class="order-number"></span>
            </div>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <h6 class="col-6">Order Number</h6>
              <h6 class="col-6">Status</h6>
            </div>
            <div class="row">
              <p class="order-number col-6"></p>
              <p class="status col-6"></p>
            </div>
            <div class="row">
              <h6 class="col-6">Creation Date</h6>
              <h6 class="col-6">Supplier</h6>
            </div>
            <div class="row">
              <p class="creation-date col-6"></p>
              <p class="supplier col-6"></p>
            </div>
            <div>
              <table class="table product-table">
                <caption id="tableCaption" style="caption-side: top">
                  <p>Order items</p>
                </caption>
                <thead>
                  <tr id="tableHead">
                    <th>start</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                  </tr>
                </thead>

                <tbody class="productBody table-light"></tbody>
              </table>
            </div>
            <div class="container">
              <div class="row">
                <p class="col-6 tq-t">Total Quantity:</p>
                <p class="col-6 tq"></p>
              </div>
              <div class="row">
                <h4 class="col-6">Total Amount:</h4>
                <h4 class="col-6 ta"></h4>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn main-btn" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="../assets/pages/orders.js" type="module"></script>
  </body>
</html>
