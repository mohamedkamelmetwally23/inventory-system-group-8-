<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!------------------ PAGE INFO ------------------>
  <title>PharmaFlow | Suppliers</title>
  <meta name="description"
    content="Manage contact details and profiles for pharmaceutical companies and medical suppliers to streamline your pharmacy's procurement process." />

  <!------------------ ICON PAGE ------------------>
  <link rel="icon" type="image/x-icon" href="../assets/imgs/icon-site/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/imgs/icon-site/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/imgs/icon-site/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/imgs/icon-site/apple-touch-icon.png" />
  <link rel="manifest" href="../assets/imgs/icon-site/site.webmanifest" />

  <!------------------ GOOGLE FONT ------------------>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />

  <!------------------ STYLES ------------------>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome ICONS-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!--  -->
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/table.css" />

  <!------------------ JAVASCRIPT ------------------>
  <!-- Bootstrap -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- assets -->
  <script defer src="../assets/components/table.js"></script>
  <script type="module" src="../assets/pages/products.js"></script>
</head>

<body>
  <div>
    <!-- Navbar -->
    <header class="border-bottom border-bottom-5 border-gray-200 px-4"></header>

    <div class="container-fluid">
      <div class="row">
        <!-- Aside -->
        <aside class="col-12 col-md-3" id="main"></aside>

        <!-- Main page -->
        <main class="col-12 col-md-9 pt-4">
          <section class="products-section">
            <div class="container">

              <!-- Header -->
              <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <div>
                  <h2 class="fw-bold text-dark-blue mb-1">Products</h2>
                  <p class="text-secondary mb-0">Manage your products and stock levels</p>
                </div>

                <button class="btn main-btn" id="addProduct">
                  <i class="fa-solid fa-circle-plus"></i>
                  Add New Product
                </button>
              </div>

              <!-- Loading -->
              <div id="loading" class="d-none text-center py-4">
                <h5>Loading...</h5>
              </div>

              <!-- Table Container -->
              <div class="table-container border rounded-4 p-3">

                <!-- Table -->
                <table class="table" id="dataTable">
                  <caption id="tableCaption" style="caption-side: top"></caption>

                  <thead>
                    <tr id="tableHead"></tr>
                  </thead>

                  <tbody id="tableBody"></tbody>
                </table>

                <!-- Modal Add / Edit Product -->
                <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel"
                  aria-hidden="true">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow rounded-4">

                      <!-- Modal Header -->
                      <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                        <div>
                          <h5 class="modal-title fw-bold text-primary mb-1" id="addProductModalLabel">
                            Add New Product
                          </h5>

                          <p id="productModalSubtitle" class="text-secondary font-12 mb-0">
                            Enter the details for the new product
                          </p>
                        </div>

                        <button type="button" class="btn-close mb-auto mt-1" data-bs-dismiss="modal"
                          aria-label="Close"></button>
                      </div>

                      <!-- Modal Body -->
                      <div class="modal-body px-4 pt-4 pb-2">
                        <form id="addProductForm">

                          <!-- SKU -->
                          <div class="mb-3">
                            <label for="productSKU" class="form-label fw-medium text-dark-blue" style="font-size: 14px">
                              SKU <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control py-2 rounded-3" id="productSKU"
                              placeholder="e.g., MED-001" />
                          </div>

                          <!-- Product Name -->
                          <div class="mb-3">
                            <label for="productName" class="form-label fw-medium text-dark-blue"
                              style="font-size: 14px">
                              Product Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control py-2 rounded-3" id="productName"
                              placeholder="e.g., Artificial Tears 0.5% Eye Drops" />
                          </div>

                          <!-- Category -->
                          <div class="mb-3">
                            <label for="productCategory" class="form-label fw-medium text-dark-blue"
                              style="font-size: 14px">
                              Category <span class="text-danger">*</span>
                            </label>
                            <select class="form-select py-2 rounded-3" id="productCategory">
                              <option value="" selected disabled>Select Category</option>
                              <option value="CAT-001">Cream</option>
                              <option value="CAT-002">Tablets</option>
                              <option value="CAT-003">Eye Drops</option>
                              <option value="CAT-004">Gel</option>
                              <option value="CAT-005">Ointment</option>
                            </select>
                          </div>

                          <!-- Quantity -->
                          <div class="mb-3">
                            <label for="quantity" class="form-label fw-medium text-dark-blue" style="font-size: 14px">
                              Quantity <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control py-2 rounded-3" id="quantity"
                              placeholder="e.g., 28" />
                          </div>

                          <!-- Reorder Level -->
                          <div class="mb-3">
                            <label for="reorderLevel" class="form-label fw-medium text-dark-blue" style="font-size: 14px">
                              Reorder Level <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control py-2 rounded-3" id="reorderLevel"
                              placeholder="e.g., 15" />
                          </div>

                          <!-- Price -->
                          <div class="mb-3">
                            <label for="price" class="form-label fw-medium text-dark-blue" style="font-size: 14px">
                              Price ($) <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control py-2 rounded-3" id="price"
                              placeholder="e.g., 291.07" />
                          </div>

                          <!-- Expire Date -->
                          <div class="mb-3">
                            <label for="productExpireDate" class="form-label fw-medium text-dark-blue"
                              style="font-size: 14px">
                              Expire Date <span class="text-danger">*</span>
                            </label>
                            <input type="date" class="form-control py-2 rounded-3" id="productExpireDate" />
                          </div>

                          <!-- Supplier Id -->
                          <div class="mb-3">
                            <label for="productSupplierId" class="form-label fw-medium text-dark-blue"
                              style="font-size: 14px">
                              Supplier Id <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control py-2 rounded-3" id="productSupplierId"
                              placeholder="e.g., SUP-004" />
                          </div>

                          <!-- Created Date -->
                          <div class="mb-3">
                            <label for="productCreatedDate" class="form-label fw-medium text-dark-blue"
                              style="font-size: 14px">
                              Created Date <span class="text-danger">*</span>
                            </label>
                            <input type="date" class="form-control py-2 rounded-3" id="productCreatedDate" />
                          </div>

                        </form>
                      </div>

                      <!-- Footer -->
                      <div class="modal-footer border-top-0 px-4 pb-4 pt-0 d-flex gap-3">
                        <button type="button" class="btn btn-outline-custom px-4 py-2 rounded-3 fw-medium m-0"
                          data-bs-dismiss="modal">
                          Cancel
                        </button>

                        <button type="submit" form="addProductForm" class="btn btn-add main-btn m-0">Save</button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- Delete Modal -->
                <div class="modal fade" id="deleteModal">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">

                      <div class="modal-header">
                        <h5 class="modal-title">Delete Product</h5>
                      </div>

                      <div class="modal-body text-center">
                        <p>Are you sure you want to delete this product?</p>
                      </div>

                      <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                          Cancel
                        </button>

                        <button class="btn btn-danger" id="confirmDelete">
                          Yes, Delete
                        </button>
                      </div>

                    </div>
                  </div>
                </div>

                <!-- Pagination -->
                <div class="table-footer d-flex justify-content-between align-items-center">
                  <span id="tableInfo" class="fs-6"></span>

                  <div class="pagination gap-2">
                    <button id="prevBtn" class="rounded-2">
                      <i class="fa-solid fa-angle-left"></i>
                    </button>

                    <span id="pageNumber" class="d-flex justify-content-center align-items-center rounded-1">1</span>

                    <button id="nextBtn" class="rounded-2">
                      <i class="fa-solid fa-angle-right"></i>
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>

</html>
