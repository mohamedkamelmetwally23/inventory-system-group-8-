<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!------------------ PAGE INFO ------------------>
    <title>PharmaFlow</title>
    <meta
      name="description"
      content="Get a comprehensive overview of your pharmacy inventory. Monitor real-time low-stock alerts and track medical product movements for efficient management."
    />

    <!------------------ ICON PAGE ------------------>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/imgs/icon-site/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/imgs/icon-site/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/imgs/icon-site/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/imgs/icon-site/apple-touch-icon.png"
    />
    <link rel="manifest" href="./assets/imgs/icon-site/site.webmanifest" />

    <!------------------ GOOGLE FONT ------------------>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!------------------ STYLES ------------------>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome ICONS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!--  -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!------------------ JAVASCRIPT ------------------>
    <!-- Bootstrap -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script type="module">
      import loadLayout from './assets/ui/layout.js';
      loadLayout('Dashboard');
    </script>
  </head>

  <body>
    <div>
      <!-- Navbar -->
      <header
        class="border-bottom border-bottom-5 border-gray-200 px-4"
      ></header>

      <div class="container-fluid">
        <div class="row">
          <!-- Aside -->
          <aside class="col-12 col-md-3" id="main"></aside>

          <!-- Main page -->
          <main class="col-12 col-md-9 pt-4">
            <section class="dashboard-section">
              <div class="container">
                <div
                  class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3"
                >
                  <div>
                    <h2 class="fw-bold text-dark-blue mb-1">Dashboard</h2>
                    <p class="text-secondary mb-0">
                      Welcome back! Here's your inventory overview.
                    </p>
                  </div>
                  <button
                    class="btn main-btn"
                    data-bs-toggle="modal"
                    data-bs-target="#addCategoryModal"
                    data-action="add"
                  >
                    <i class="fa fa-cube me-1"></i> Add New Product
                  </button>
                </div>

                <!-- Complete here -->
              </div>
            </section>
          </main>
        </div>
      </div>
    </div>
